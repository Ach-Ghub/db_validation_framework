services:
  # --- DATABASE SERVICE ---
  db:
    image: mysql:8.0
    container_name: validation_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_ecomerce_etl
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    # 🌟 Added: Docker will check if MySQL is actually accepting connections
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- PYTHON ETL ENGINE SERVICE ---
  app:
    build: .
    container_name: validation_python_app
    # 🌟 Updated: Wait specifically for the database to pass its health check
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@db:3306/db_ecomerce_etl

volumes:
  db_data: